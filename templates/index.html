<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Intelligence Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2333;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --warn: #f0883e;
      --danger: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      font-size: 22px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: calc(100vh - 65px);
    }

    /* LEFT PANEL */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-inner {
      padding: 20px;
      flex: 1;
      overflow-y: auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .allocation-bar-wrap {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 16px;
    }

    .allocation-bar-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .allocation-label { color: var(--muted); }
    .allocation-value { font-weight: 600; }
    .allocation-value.over { color: var(--danger); }
    .allocation-value.full { color: var(--accent2); }
    .allocation-value.partial { color: var(--warn); }

    .bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .bar-fill.over { background: var(--danger); }
    .bar-fill.full { background: var(--accent2); }

    .holdings-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .holding-row {
      display: grid;
      grid-template-columns: 1fr 90px 32px;
      gap: 8px;
      align-items: center;
    }

    input[type="text"], input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder { color: var(--muted); }

    .ticker-input { text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }

    .weight-input { text-align: right; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: var(--danger); }

    .add-btn {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      margin-bottom: 20px;
    }

    .add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
    }

    .analyze-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0d1117;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .analyze-btn:hover:not(:disabled) {
      background: #79c0ff;
    }

    .analyze-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .presets {
      margin-bottom: 20px;
    }

    .presets-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .preset-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* RIGHT PANEL */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .results-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      text-align: center;
      gap: 12px;
    }

    .empty-icon { font-size: 48px; opacity: 0.4; }
    .empty-state h2 { font-size: 16px; font-weight: 600; color: var(--text); opacity: 0.5; }
    .empty-state p { font-size: 13px; max-width: 300px; }

    .result-content { display: none; }
    .result-content.visible { display: block; }

    /* Markdown styling */
    .md-output h3 {
      font-size: 15px;
      font-weight: 700;
      margin: 28px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    .md-output h3:first-child { margin-top: 0; }

    .md-output p {
      color: #cdd9e5;
      margin-bottom: 10px;
      line-height: 1.7;
    }

    .md-output ul, .md-output ol {
      padding-left: 20px;
      margin-bottom: 10px;
    }

    .md-output li {
      color: #cdd9e5;
      margin-bottom: 4px;
      line-height: 1.6;
    }

    .md-output strong {
      color: var(--text);
      font-weight: 600;
    }

    .md-output em { color: var(--muted); }

    .md-output code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      color: var(--accent);
    }

    .md-output hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .typing-cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .status-bar {
      padding: 10px 36px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    .status-dot.running {
      background: var(--accent2);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .error-banner {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header class="header">
  <span class="header-icon">📊</span>
  <div>
    <h1>Portfolio Intelligence Engine</h1>
    <p>Structural analysis · Correlation risk · Factor exposure · Gap detection</p>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-inner">

      <div class="presets">
        <div class="section-label">Load preset</div>
        <div class="presets-row">
          <button class="preset-chip" onclick="loadPreset('mag7')">Mag-7 Heavy</button>
          <button class="preset-chip" onclick="loadPreset('balanced')">Balanced</button>
          <button class="preset-chip" onclick="loadPreset('defensive')">Defensive</button>
          <button class="preset-chip" onclick="loadPreset('clear')">Clear</button>
        </div>
      </div>

      <div class="allocation-bar-wrap">
        <div class="allocation-bar-labels">
          <span class="allocation-label">Total allocation</span>
          <span class="allocation-value partial" id="total-pct">0%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="alloc-bar" style="width:0%"></div>
        </div>
      </div>

      <div class="section-label">Holdings</div>

      <div class="holdings-list" id="holdings-list"></div>

      <button class="add-btn" onclick="addRow()">+ Add holding</button>

      <button class="analyze-btn" id="analyze-btn" onclick="analyze()" disabled>
        Run Analysis
      </button>

    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="results-area" id="results-area">

      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🔬</div>
        <h2>No portfolio loaded</h2>
        <p>Add your holdings on the left and click Run Analysis to get a full diagnostic report.</p>
      </div>

      <div class="result-content" id="result-content">
        <div class="error-banner" id="error-banner" style="display:none"></div>
        <div class="md-output" id="md-output"></div>
      </div>

    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </main>

</div>

<script>
  const PRESETS = {
    mag7: [
      { ticker: 'AAPL', weight: 20 }, { ticker: 'MSFT', weight: 20 },
      { ticker: 'NVDA', weight: 20 }, { ticker: 'AMZN', weight: 15 },
      { ticker: 'GOOGL', weight: 10 }, { ticker: 'META', weight: 10 },
      { ticker: 'TSLA', weight: 5 },
    ],
    balanced: [
      { ticker: 'SPY', weight: 25 }, { ticker: 'QQQ', weight: 15 },
      { ticker: 'GLD', weight: 10 }, { ticker: 'TLT', weight: 15 },
      { ticker: 'VNQ', weight: 10 }, { ticker: 'XLE', weight: 10 },
      { ticker: 'XLV', weight: 15 },
    ],
    defensive: [
      { ticker: 'JNJ', weight: 20 }, { ticker: 'PG', weight: 20 },
      { ticker: 'KO', weight: 15 }, { ticker: 'WMT', weight: 15 },
      { ticker: 'VZ', weight: 15 }, { ticker: 'NEE', weight: 15 },
    ],
    clear: [],
  };

  let rowId = 0;

  function addRow(ticker = '', weight = '') {
    const id = rowId++;
    const list = document.getElementById('holdings-list');
    const row = document.createElement('div');
    row.className = 'holding-row';
    row.id = `row-${id}`;
    row.innerHTML = `
      <input type="text" class="ticker-input" placeholder="TICKER"
        value="${ticker}" oninput="this.value=this.value.toUpperCase();updateTotal()" />
      <input type="number" class="weight-input" placeholder="%" min="0" max="100"
        value="${weight}" oninput="updateTotal()" />
      <button class="remove-btn" onclick="removeRow(${id})" title="Remove">✕</button>
    `;
    list.appendChild(row);
    updateTotal();
    if (!ticker) row.querySelector('.ticker-input').focus();
  }

  function removeRow(id) {
    document.getElementById(`row-${id}`)?.remove();
    updateTotal();
  }

  function getHoldings() {
    const rows = document.querySelectorAll('.holding-row');
    const result = [];
    rows.forEach(row => {
      const ticker = row.querySelector('.ticker-input').value.trim();
      const weight = parseFloat(row.querySelector('.weight-input').value);
      if (ticker && !isNaN(weight) && weight > 0) {
        result.push({ ticker, weight });
      }
    });
    return result;
  }

  function updateTotal() {
    const holdings = getHoldings();
    const total = holdings.reduce((s, h) => s + h.weight, 0);
    const el = document.getElementById('total-pct');
    const bar = document.getElementById('alloc-bar');
    const btn = document.getElementById('analyze-btn');

    el.textContent = total.toFixed(1) + '%';
    el.className = 'allocation-value ' + (total > 100 ? 'over' : total === 100 ? 'full' : 'partial');
    bar.style.width = Math.min(total, 100) + '%';
    bar.className = 'bar-fill ' + (total > 100 ? 'over' : total === 100 ? 'full' : '');
    btn.disabled = holdings.length < 2 || total <= 0;
  }

  function loadPreset(name) {
    document.getElementById('holdings-list').innerHTML = '';
    rowId = 0;
    const rows = PRESETS[name] || [];
    rows.forEach(r => addRow(r.ticker, r.weight));
    updateTotal();
  }

  let currentStream = null;
  let rawMarkdown = '';

  async function analyze() {
    const holdings = getHoldings();
    if (holdings.length < 2) return;

    if (currentStream) { currentStream.abort(); }

    rawMarkdown = '';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('result-content').classList.add('visible');
    document.getElementById('error-banner').style.display = 'none';
    document.getElementById('md-output').innerHTML = '';

    setStatus('running', 'Analyzing portfolio...');

    const ctrl = new AbortController();
    currentStream = ctrl;

    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ holdings }),
        signal: ctrl.signal,
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') {
            renderFinal();
            setStatus('ready', 'Analysis complete');
            return;
          }
          try {
            const parsed = JSON.parse(data);
            if (parsed.error) {
              showError(parsed.error);
              setStatus('ready', 'Error');
              return;
            }
            if (parsed.text) {
              rawMarkdown += parsed.text;
              renderStreaming();
            }
          } catch {}
        }
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        showError(e.message);
        setStatus('ready', 'Error');
      }
    }
  }

  function renderStreaming() {
    const el = document.getElementById('md-output');
    el.innerHTML = marked.parse(rawMarkdown) + '<span class="typing-cursor"></span>';
    el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  function renderFinal() {
    const el = document.getElementById('md-output');
    el.innerHTML = marked.parse(rawMarkdown);
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = 'Error: ' + msg;
    el.style.display = 'block';
    document.getElementById('result-content').classList.add('visible');
    document.getElementById('empty-state').style.display = 'none';
  }

  function setStatus(state, text) {
    document.getElementById('status-dot').className = 'status-dot' + (state === 'running' ? ' running' : '');
    document.getElementById('status-text').textContent = text;
  }

  // Init with a default
  loadPreset('mag7');
</script>

</body>
</html>
